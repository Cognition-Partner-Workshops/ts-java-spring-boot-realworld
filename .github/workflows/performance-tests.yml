name: Performance Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  api-performance:
    runs-on: ubuntu-latest
    name: API Performance Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Application
        run: ./gradlew spotlessApply build -x test --no-daemon

      - name: Start Application
        run: |
          ./gradlew bootRun --no-daemon &
          sleep 30

      - name: Setup K6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: '1.0.0'

      - name: Run Smoke Tests
        run: k6 run src/test/performance/smoke.js
        env:
          BASE_URL: http://localhost:8080
        continue-on-error: true

      - name: Run Load Tests
        run: k6 run src/test/performance/load.js
        env:
          BASE_URL: http://localhost:8080
        continue-on-error: true

      - name: Run Stress Tests
        run: k6 run src/test/performance/stress.js
        env:
          BASE_URL: http://localhost:8080
        continue-on-error: true

      - name: Stop Application
        run: pkill -f 'java.*spring-boot' || true
