version: '3.8'

services:
  tags-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    volumes:
      - tags-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  tags-data:
