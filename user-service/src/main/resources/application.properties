server.port=8081
spring.application.name=user-service

spring.datasource.url=jdbc:sqlite:user-service.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

image.default=https://static.productionready.io/images/smiley-cyrus.jpg

jwt.secret=${JWT_SECRET:changeme-use-env-variable-in-production}
jwt.sessionTime=${JWT_SESSION_TIME:86400}

mybatis.configuration.cache-enabled=true
mybatis.configuration.default-statement-timeout=3000
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true
mybatis.type-handlers-package=io.spring.userservice.infrastructure.mybatis
mybatis.mapper-locations=mapper/*.xml

logging.level.io.spring.userservice.infrastructure.mybatis=DEBUG
