# Kustomization file for RealWorld Article Management Microservice
# Use: kubectl apply -k k8s/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: realworld-app

namespace: realworld

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - pvc.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - ingress.yaml

# Common labels applied to all resources
commonLabels:
  app.kubernetes.io/name: realworld
  app.kubernetes.io/component: article-service
  app.kubernetes.io/managed-by: kustomize

# Image customization (override in overlays)
images:
  - name: realworld-article-service
    newTag: latest
