# R2DBC Configuration for H2
spring.r2dbc.url=r2dbc:h2:file:///./dev;DB_CLOSE_DELAY=-1
spring.r2dbc.username=sa
spring.r2dbc.password=

# JDBC Configuration for Flyway migrations
spring.datasource.url=jdbc:h2:file:./dev;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson Configuration
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

# Default Image
image.default=https://static.productionready.io/images/smiley-cyrus.jpg

# JWT Configuration
jwt.secret=nRvyYC4soFxBdZ-F-5Nnzz5USXstR1YylsTd-mA0aKtI9HUlriGrtkf-TiuDapkLiUCogO3JOK7kwZisrHp6wA
jwt.sessionTime=86400

# Logging
logging.level.io.spring=DEBUG
logging.level.org.springframework.r2dbc=DEBUG

# H2 Console (for development)
spring.h2.console.enabled=true

# OpenAPI/Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
