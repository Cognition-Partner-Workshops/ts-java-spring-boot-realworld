# Spring AI Application Configuration
spring.application.name=spring-ai-app
server.port=8080

# OpenAI Configuration
# Set your API key via environment variable: SPRING_AI_OPENAI_API_KEY
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:your-api-key-here}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.image.options.model=dall-e-3

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.org.springframework.ai=DEBUG
