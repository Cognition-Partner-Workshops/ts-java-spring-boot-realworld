version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-boot-realworld-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/dev.db
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/tags"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3

volumes:
  app-data:
    driver: local
