# R2DBC Configuration for H2 (in-memory with initialization)
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1
spring.r2dbc.username=sa
spring.r2dbc.password=

# R2DBC Schema Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.data-locations=classpath:data-h2.sql

# Disable Flyway (using Spring SQL init instead for R2DBC compatibility)
spring.flyway.enabled=false

# Jackson Configuration
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

# Default Image
image.default=https://static.productionready.io/images/smiley-cyrus.jpg

# JWT Configuration
jwt.secret=nRvyYC4soFxBdZ-F-5Nnzz5USXstR1YylsTd-mA0aKtI9HUlriGrtkf-TiuDapkLiUCogO3JOK7kwZisrHp6wA
jwt.sessionTime=86400

# Logging
logging.level.io.spring=DEBUG
logging.level.org.springframework.r2dbc=DEBUG

# H2 Console (for development)
spring.h2.console.enabled=true

# OpenAPI/Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
