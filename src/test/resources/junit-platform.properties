## Cucumber JUnit Platform configuration
## These properties are picked up automatically by the Cucumber JUnit Platform Engine.

# Output report plugins — generates both human-readable HTML and machine-readable JSON reports.
cucumber.plugin=pretty, \
  html:build/reports/cucumber/cucumber-report.html, \
  json:build/reports/cucumber/cucumber-report.json

# Glue path where step definitions, hooks, and the Spring context configuration reside.
cucumber.glue=io.spring.bdd

# Location of Gherkin feature files.
cucumber.features=src/test/resources/features

# Publish a link to the Cucumber Reports service (disabled by default for privacy).
cucumber.publish-quiet=true
