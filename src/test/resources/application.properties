# ===========================================
# Test Database Configuration - H2 In-Memory
# ===========================================
# Use unique database per test context to avoid conflicts
# The DB_CLOSE_DELAY=-1 keeps the database alive until JVM exits
spring.datasource.url=jdbc:h2:mem:testdb-${random.uuid};MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Generate unique database name for each test context
spring.datasource.generate-unique-name=true

# ===========================================
# Flyway Configuration for Tests
# ===========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.target=1
spring.flyway.clean-disabled=false

# ===========================================
# Spring Cloud Configuration for Tests
# ===========================================
spring.cloud.discovery.enabled=false
spring.cloud.loadbalancer.enabled=false

# ===========================================
# Jackson Configuration
# ===========================================
spring.jackson.deserialization.UNWRAP_ROOT_VALUE=true

# ===========================================
# Application Configuration
# ===========================================
spring.application.name=realworld-app-test
image.default=https://static.productionready.io/images/smiley-cyrus.jpg

# ===========================================
# JWT Configuration
# ===========================================
jwt.secret=${JWT_SECRET:test-secret-for-testing-only}
jwt.sessionTime=86400

# ===========================================
# MyBatis Configuration
# ===========================================
mybatis.configuration.cache-enabled=true
mybatis.configuration.default-statement-timeout=3000
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.use-generated-keys=true
mybatis.type-handlers-package=io.spring.infrastructure.mybatis
mybatis.mapper-locations=mapper/*.xml

# ===========================================
# Disable Spring Cloud features for tests
# ===========================================
eureka.client.enabled=false
spring.cloud.config.enabled=false
spring.sleuth.enabled=false
spring.zipkin.enabled=false

# ===========================================
# Logging Configuration
# ===========================================
logging.level.io.spring.infrastructure.mybatis.readservice.ArticleReadService=DEBUG
logging.level.io.spring.infrastructure.mybatis.mapper=DEBUG
